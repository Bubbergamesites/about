<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Me | Portfolio</title>
    <style>
        :root {
            --purple: #8a2be2;
            --dark: #1a1a1a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .profile-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .profile-header img {
            width: 120px;
            border-radius: 50%;
        }

        /* Project Grid */
        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1200px;
        }


        .project-card:hover {
            transform: translateY(-5px);
        }

        .project-preview {
            /* 1. Make the 'virtual' window much larger than the card */
            width: 200%;
            height: 200%;

            /* 2. Scale it back down to fit (0.5 is half of 200%) */
            transform: scale(0.5);

            /* 3. Ensure it scales from the top-left corner */
            transform-origin: 0 0;

            border: none;
            pointer-events: none;
        }

        .project-card {
            /* Crucial: Hide the parts of the 200% iframe that stick out */
            overflow: hidden;
            position: relative;
            height: 220px;
            /* Set a fixed height for the card */
        }

        .project-title {
            padding: 15px;
            font-weight: bold;
            text-align: center;
            color: var(--dark);
        }

        /* Fullscreen Overlay */
        #overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
        }

        #overlay iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 40px;
            color: white;
            cursor: pointer;
            z-index: 1001;
            user-select: none;
        }

        .close-btn:hover {
            color: var(--purple);
        }
    </style>
</head>

<body>

    <header class="profile-header">
        <img src="logo.png" alt="Logo">
        <h1>About Me</h1>
        <p>Welcome to my portfolio. Click any project to view it full-screen.</p>
    </header>

    <div class="project-grid">
        <div class="project-card" onclick="openProject('https://netlii.dpdns.org')">
            <div class="project-title">Netlii</div>
            <iframe src="https://netlii.dpdns.org" class="project-preview"></iframe>
        </div>

        <div class="project-card" onclick="openProject('https://shutuptheteacherscoming.dpdns.org/')">
            <div class="project-title">Nexus Proxy</div>
            <iframe src="https://shutuptheteacherscoming.dpdns.org/" class="project-preview"></iframe>
        </div>

        <div class="project-card" onclick="openProject('https://thegeeseinmyhead.dpdns.org/*')">
            <div class="project-title">BoxNet</div>
            <iframe src="https://thegeeseinmyhead.dpdns.org/*" class="project-preview"></iframe>
        </div>
        <div class="project-card" onclick="openProject('https://theyesyesbox.dpdns.org')">
            <div class="project-title">TheYesYesBox</div>
            <iframe src="https://theyesyesbox.dpdns.org" class="project-preview"></iframe>
        </div>
        <div class="project-card" onclick="openProject('https://0k3a.dpdns.org/')">
            <div class="project-title">0K3A</div>
            <iframe src="https://0k3a.dpdns.org/" class="project-preview"></iframe>
        </div>
        <div class="project-card" onclick="openProject('https://toolboxos.wasmer.app/')">
            <div class="project-title">ToolboxOS</div>
            <iframe src="https://toolboxos.wasmer.app/" class="project-preview"></iframe>
        </div>
        <div class="project-card" onclick="openProject('https://netlii.dpdns.org/projects/f1rgp/')">
            <div class="project-title">F1 Random GP</div>
            <iframe src="https://netlii.dpdns.org/projects/f1rgp/" class="project-preview"></iframe>
        </div>
        <div class="project-card" onclick="openProject('https://buisness.dpdns.org')">
            <div class="project-title">UBG888</div>
            <iframe src="https://buisness.dpdns.org" class="project-preview"></iframe>
        </div>
        <div class="project-card" onclick="openProject('https://brickgame.dpdns.org/')">
            <div class="project-title">Brick game 9999 online</div>
            <iframe src="https://brickgame.dpdns.org" class="project-preview"></iframe>
        </div>
    </div>

    <div id="overlay">
        <span class="close-btn" onclick="closeProject()">&times;</span>
        <iframe id="overlay-frame" src=""></iframe>
    </div>

    <script>
        const overlay = document.getElementById('overlay');
        const overlayFrame = document.getElementById('overlay-frame');

        function openProject(url) {
            overlayFrame.src = url;
            overlay.style.display = 'block';
            document.body.style.overflow = 'hidden'; // Stop scrolling background
        }

        function closeProject() {
            overlay.style.display = 'none';
            overlayFrame.src = ''; // Stop loading/playing content
            document.body.style.overflow = 'auto'; // Restore scrolling
        }

        // Close on 'Esc' key
        window.addEventListener('keydown', (e) => {
            if (e.key === "Escape") closeProject();
        });
    </script>

</body>

</html>
